<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxiso - Checkout</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --c1: #CCDCFD;
            --c2: #BBBEFE;
            --c3: #9EA3F5;
            --c4: #E8BFFB;
            --text: #1a1a1a;
            --text-light: #666;
            --shadow-sm: 0 4px 15px rgba(158, 163, 245, 0.15);
            --shadow-md: 0 10px 30px rgba(158, 163, 245, 0.2);
        }

        body {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background: #fafbff;
            padding-top: 100px;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 10px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--c1);
            box-shadow: var(--shadow-sm);
        }

        .logo { height: 60px; cursor: pointer; }

        .nav-links {
            display: flex;
            gap: 10px;
            margin: 0;
            padding: 0;
        }

        .nav-links li {
            list-style: none;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--c1);
            transition: all 0.2s ease;
        }

        .nav-links li:hover { background: var(--c3); color: white; }
        .nav-links li a { text-decoration: none; color: inherit; font-weight: 600; font-size: 14px; }

        .checkout-box {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow-md);
        }

        .cart-item-card {
            border: 1px solid var(--c1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--c1), var(--c4));
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }

        .loading.hidden { opacity: 0; pointer-events: none; }

        .loader {
            width: 60px; height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid var(--c3);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div class="loading" id="loading">
        <div class="loader"></div>
    </div>

    <nav class="navbar" id="navbar">
        <div class="nav-left">
            <a href="index.html#home">
                <img class="logo" src="https://raw.githubusercontent.com/laopulento2029/laopulento2029.github.io./refs/heads/main/logo.png" alt="Maxiso Logo">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="index.html#arrivals">Collaborations</a></li>
                <li><a href="index.html#about">Team</a></li>
                <li><a href="index.html#branches">Branches</a></li>
            </ul>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row g-4">
            <div class="col-md-7">
                <div class="checkout-box">
                    <h4 class="mb-4"><i class="bi bi-credit-card-2-front me-2"></i>Billing Details</h4>
                    
                    <form id="checkoutForm" action="http://52.74.133.173/cs3/checkout.php" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" name="cust_name" required placeholder="Full Name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" name="cust_email" required placeholder="Email Address">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Shipping Address</label>
                            <textarea class="form-control" name="cust_addr" rows="3" required placeholder="Street, City, Province"></textarea>
                        </div>

                        <input type="hidden" name="cust_order" id="cust_order_input">

                        <button type="submit" class="btn btn-primary w-100 py-3 mt-3" style="background-color: var(--c3); border: none;">
                            <b>Place Order</b>
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-md-5">
                <div class="checkout-box">
                    <h4 class="mb-4"><i class="bi bi-cart3 me-2"></i>Your Cart</h4>
                    <div id="cartItems"></div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <h5>Total:</h5>
                        <h5 id="total" style="color: var(--c3); font-weight: bold;">₱0</h5>
                    </div>
                    <div class="mt-3 text-center">
                        <a href="index.html#products" class="text-decoration-none text-muted small">
                            <i class="bi bi-arrow-left"></i> Continue Shopping
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 800);
            renderCart();
        });

        function getCart() {
            return JSON.parse(localStorage.getItem("cart")) || [];
        }

        function renderCart() {
            const container = document.getElementById("cartItems");
            const totalEl = document.getElementById("total");
            const hiddenOrderInput = document.getElementById("cust_order_input");

            let cart = getCart();
            container.innerHTML = "";
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = "<div class='text-center py-4'><p class='text-muted'>Your cart is empty.</p></div>";
                totalEl.innerText = "₱0";
                hiddenOrderInput.value = "";
                return;
            }

            cart.forEach((item, index) => {
                const qty = item.quantity || 1;
                const subtotal = item.price * qty;
                total += subtotal;

                container.innerHTML += `
                    <div class="cart-item-card">
                        <div class="d-flex justify-content-between">
                            <strong>${item.name}</strong>
                            <span>₱${subtotal.toLocaleString()}</span>
                        </div>
                        <small class="text-muted">₱${item.price} x ${qty}</small>
                        <div class="mt-2">
                            <button class="btn btn-link btn-sm text-danger p-0" onclick="removeItem(${index})">
                                Remove
                            </button>
                        </div>
                    </div>
                `;
            });

            totalEl.innerText = "₱" + total.toLocaleString();

            const formattedOrder = cart.map(item => ({
                prod_name: item.name,
                prod_price: item.price
            }));

            hiddenOrderInput.value = JSON.stringify(formattedOrder);
        }

        function removeItem(index) {
            let cart = getCart();
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }
    </script>
</body>
</html>
